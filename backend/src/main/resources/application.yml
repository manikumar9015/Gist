spring:
  application:
    name: easyread-backend
  profiles:
    active: prod

  # JPA defaults
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # File upload limits
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Server
server:
  port: 8080
  error:
    include-message: always

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# EasyRead custom properties
easyread:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-jwt-key-for-development-only-change-in-prod-minimum-256-bits}
    expiration-ms: 86400000  # 24 hours

  ai:
    groq-key: ${GROQ_API_KEY:}
    gemini-key: ${GEMINI_API_KEY:}
    huggingface-key: ${HF_API_KEY:}
    simplification-chunk-size: 500

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

  cache:
    raw-chunk-ttl-hours: 24
    easy-chunk-ttl-hours: 1
    search-ttl-minutes: 10
    circuit-breaker-ttl-seconds: 60

# Resilience4j Circuit Breaker defaults
resilience4j:
  circuitbreaker:
    instances:
      groqCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 1
        minimumNumberOfCalls: 5
      geminiCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 75s
        permittedNumberOfCallsInHalfOpenState: 1
        minimumNumberOfCalls: 5
      huggingfaceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 90s
        permittedNumberOfCallsInHalfOpenState: 1
        minimumNumberOfCalls: 5
